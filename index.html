<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Эсхата Leasing — Калькулятор</title>
 
<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  FAVICON                                                 ║
  ║  Замените "favicon.ico" на путь к вашему файлу.          ║
  ║  Поддерживаются .ico, .png, .svg                         ║
  ║  Пример: ./assets/favicon.png                            ║
  ╚══════════════════════════════════════════════════════════╝
-->
<link rel="icon" type="image/png" href="favicon.png">
<!-- Если .ico формат: -->
<!-- <link rel="icon" type="image/x-icon" href="favicon.ico"> -->
<!-- Если SVG: -->
<!-- <link rel="icon" type="image/svg+xml" href="favicon.svg"> -->
 
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   SCREEN
══════════════════════════════════ */
:root {
  --brand-blue:#1a4fa0; --brand-blue-light:#2563c7; --brand-accent:#6c63ff;
  --bg:#eef1f7; --card:#fff; --text:#0f1923; --muted:#6b7a8d;
  --border:#dde3ed; --shadow:0 2px 16px rgba(26,79,160,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
 
header{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 40px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(26,79,160,.06);
}
 
/*
  ══════════════════════════════════════════════════════════
  ЛОГОТИП В ШАПКЕ (ЭКРАН)
  .logo-icon — показывается если нет файла логотипа (fallback)
  .logo-img  — показывается если логотип задан
  Если хотите использовать картинку-логотип:
    1. Раскомментируйте <img class="logo-img"> в HTML ниже
    2. Закомментируйте <div class="logo-icon">
    3. Укажите src="./assets/logo.png"
  ══════════════════════════════════════════════════════════
*/
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:var(--text);text-decoration:none}
.logo-icon{width:36px;height:36px;background:var(--brand-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
.logo-img{height:36px;width:auto;object-fit:contain;flex-shrink:0}
.logo span{color:var(--brand-blue-light);font-weight:500}
 
.lang-switcher{display:flex;gap:14px}
.lang-switcher a{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .2s}
.lang-switcher a:hover,.lang-switcher a.active{color:var(--brand-blue)}
 
main{max-width:1100px;margin:0 auto;padding:36px 24px 60px}
.calculator-grid{display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start}
.card{background:var(--card);border-radius:16px;padding:28px;box-shadow:var(--shadow)}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=number]{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:'Manrope',sans-serif;font-weight:500;color:var(--text);
  background:#f8fafd;transition:border-color .2s,box-shadow .2s;outline:none
}
input:focus{border-color:var(--brand-blue-light);box-shadow:0 0 0 3px rgba(37,99,199,.1);background:#fff}
.input-wrap{position:relative}
.input-wrap input{padding-right:36px}
.input-suffix{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);font-weight:600;pointer-events:none}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
.btn-primary{background:linear-gradient(135deg,var(--brand-blue),var(--brand-accent));color:#fff}
.btn-primary:hover{box-shadow:0 4px 16px rgba(108,99,255,.35);transform:translateY(-1px)}
.btn-secondary{background:var(--text);color:#fff}
.btn-secondary:hover{background:#1e2a38;transform:translateY(-1px)}
 
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.result-cell{background:#f4f7fb;border-radius:12px;padding:14px 16px;border:1px solid var(--border)}
.result-cell.full{grid-column:1/-1}
.result-cell.highlight{background:#eef4ff;border-color:#c7d8f7}
.cell-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.cell-value{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.cell-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
 
.internal-row{grid-column:1/-1;background:#fff7ed;border:1px solid #fcd9a0;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.internal-row .cell-label{color:#92400e}
.internal-row .cell-value{font-size:19px;font-weight:800;color:#b45309}
.internal-badge{font-size:10px;background:#fef3c7;color:#92400e;border-radius:6px;padding:3px 8px;font-weight:700;border:1px solid #fcd9a0;white-space:nowrap}
 
.max-disc-row{grid-column:1/-1;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:12px;padding:13px 16px}
.max-disc-row .cell-label{color:#065f46;margin-bottom:8px}
.max-disc-input-row{display:flex;align-items:center;gap:10px}
.max-disc-input-row input{width:120px;padding:8px 32px 8px 12px;border:1.5px solid #6ee7b7;border-radius:8px;font-size:14px;font-family:'Manrope',sans-serif;font-weight:600;color:#065f46;background:#fff;outline:none}
.max-disc-amt{font-size:13px;color:#065f46;font-weight:600}
 
.client-fee-row{grid-column:1/-1;background:#fdf4ff;border:1px solid #e9d5ff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.client-fee-row .cell-label{color:#6b21a8}
.client-fee-row .cell-value{font-size:19px;font-weight:800;color:#7c3aed}
 
.schedule-section{margin-top:24px}
.section-title{font-size:15px;font-weight:700;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:var(--brand-blue);color:#fff}
thead th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
tbody tr:nth-child(even){background:#f8fafd}
tbody tr:hover{background:#eef4ff}
tbody td{padding:7px 12px;border-bottom:1px solid #f0f3f8;font-weight:500}
tbody td:not(:first-child){text-align:right}
tfoot tr{background:#e8eef8;font-weight:700}
tfoot td{padding:8px 12px;border-top:2px solid var(--brand-blue)}
tfoot td:not(:first-child){text-align:right}
 
.empty-results{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-results svg{opacity:.3;margin:0 auto 12px;display:block}
.empty-results p{font-size:14px;font-weight:500}
 
.action-btns{display:none;margin-top:16px;gap:10px}
.action-btns.visible{display:flex}
.btn-print{padding:10px 20px;background:var(--brand-blue);color:#fff;border:none;border-radius:8px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.btn-print:hover{background:var(--brand-blue-light)}
.btn-exit{display:none;padding:10px 20px;background:#e2e8f0;color:var(--text);border:none;border-radius:8px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
 
/* client mode */
body.client-mode header{display:none}
body.client-mode main{padding:16px}
body.client-mode .form-card{display:none}
body.client-mode .calculator-grid{grid-template-columns:1fr}
body.client-mode .internal-row{display:none!important}
body.client-mode .max-disc-row{display:none!important}
body.client-mode .cell-overpay{display:none!important}
body.client-mode .btn-exit{display:inline-block}
 
.client-summary-header{display:none;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--brand-blue)}
body.client-mode .client-summary-header{display:flex}
.print-title{font-size:18px;font-weight:800}
.print-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
 
/* print doc hidden on screen — keep in DOM so window.print() can access it */
#printDoc{position:absolute;left:-9999px;top:0;width:210mm;visibility:hidden;pointer-events:none}
 
/* ══════════════════════════════════
   PRINT
══════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:14mm 16mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>header,body>main,.action-btns{display:none!important}
  body{background:#fff;margin:0;padding:0}
 
  #printDoc{
    display:block!important;
    position:static!important;
    left:auto!important;
    top:auto!important;
    visibility:visible!important;
    width:100%;
    font-family:Arial,Helvetica,sans-serif;
    font-size:9pt;
    color:#000;
  }
 
  /* ── Logo box ── */
  .pd-logo-box{
    display:table;
    border:1.5pt solid #1a4fa0;
    border-radius:5pt;
    padding:7pt 14pt;
    margin-bottom:14pt;
  }
  .pd-logo-inner{display:table-cell;vertical-align:middle}
  .pd-logo-inner2{display:table-cell;vertical-align:middle;padding-left:10pt}
  .pd-logo-name{font-size:17pt;font-weight:700;color:#0f1923;line-height:1;letter-spacing:-.2pt;white-space:nowrap}
  .pd-logo-name em{color:#1a4fa0;font-style:normal;font-weight:400}
  /*
    Если используете картинку в печатном логотипе:
    .pd-print-logo-img { height:36pt; width:auto; }
  */
 
  /* ── Top 2-row summary ── */
  .pd-top{width:100%;border-collapse:collapse;margin-bottom:6pt;font-size:9pt}
  .pd-top td{padding:5pt 8pt;border:0.5pt solid #b0bac8}
  .pt-lbl{color:#222;width:62%}
  .pt-val{font-weight:700;text-align:right;font-size:9.5pt}
 
  /* ── Conditions block ── */
  .pd-cond{width:100%;border-collapse:collapse;margin-bottom:6pt;font-size:9pt}
  .pd-cond-head td{background:#d0daea!important;font-weight:700;text-align:center;padding:4pt 8pt;border:0.5pt solid #b0bac8;font-size:9pt}
  .pd-cond td{padding:4pt 8pt;border:0.5pt solid #b0bac8;vertical-align:middle}
  .pc-lbl{color:#222;width:52%}
  .pc-mid{color:#555;font-size:8.5pt;text-align:center;width:10%}
  .pc-val{font-weight:700;text-align:right}
  .pd-cond .pc-alt td{background:#f0f3f9!important}
 
  /* ── Signing amount ── */
  .pd-sign{width:100%;border-collapse:collapse;margin-bottom:6pt;font-size:9pt}
  .pd-sign td{padding:5pt 8pt;border:0.5pt solid #b0bac8}
  .ps-lbl{color:#222;font-weight:600;width:62%}
  .ps-val{font-weight:700;text-align:right;font-size:9.5pt}
 
  /* ── Debt row ── */
  .pd-debt{width:100%;border-collapse:collapse;margin-bottom:14pt;font-size:9pt}
  .pd-debt td{padding:5pt 8pt;border:0.5pt solid #b0bac8}
  .pdl{color:#222;width:62%}
  .pdv{font-weight:700;text-align:right}
 
  /* ── Schedule ── */
  .pd-sched-wrap{border:0.5pt solid #b0bac8}
  .pd-sched-hd{font-size:9pt;font-weight:700;text-align:center;padding:4pt;background:#eef2f8;border-bottom:0.5pt solid #b0bac8}
  .pd-sched{width:100%;border-collapse:collapse;font-size:8.5pt}
  .pd-sched thead tr{background:#fff}
  .pd-sched thead th{color:#333;padding:4pt 6pt;text-align:center;font-weight:600;font-size:8.5pt;border-bottom:0.5pt solid #b0bac8;border-right:0.5pt solid #d0d8e8}
  .pd-sched .sched-sub td{font-weight:700;text-align:right;padding:3pt 6pt;font-size:8.5pt;border-bottom:0.5pt solid #b0bac8;border-right:0.5pt solid #d0d8e8;background:#f8f9fc}
  .pd-sched .sched-sub td:first-child{text-align:center}
  .pd-sched tbody td{padding:2.5pt 6pt;border-bottom:0.5pt solid #e8ecf2;border-right:0.5pt solid #e8ecf2;text-align:right}
  .pd-sched tbody td:first-child{text-align:center;color:#333}
  .pd-sched tbody tr:last-child td{border-bottom:none}
}
</style>
</head>
<body>
 
<!-- ══════════════════════════════════════
     SCREEN HEADER
══════════════════════════════════════ -->
<header>
  <a class="logo" href="#">
 
    <!--
      ══════════════════════════════════════════════════════
      ЛОГОТИП В ШАПКЕ — выберите один из вариантов:
 
      ВАРИАНТ А (текущий): цветной круг с буквой «Э»
      ВАРИАНТ Б: картинка-логотип (раскомментируйте img ниже
                 и закомментируйте div.logo-icon)
 
      Для варианта Б:
        src="./assets/logo.png"   ← путь к вашему логотипу
        Рекомендуемый размер: высота 36px, прозрачный фон
      ══════════════════════════════════════════════════════
    -->
 
    <!-- ВАРИАНТ А (fallback — круг с буквой): -->
    <div class="logo-icon">Э</div>
 
    <!-- ВАРИАНТ Б (картинка логотип): -->
    <!-- <img class="logo-img" src="./assets/logo.png" alt="Эсхата Leasing"> -->
 
    Эсхата <span>Leasing</span>&nbsp; Калькулятор
  </a>
  <div class="lang-switcher">
    <a class="active" onclick="setLang('ru')">RU</a>
    <a onclick="setLang('uz')">UZ</a>
    <a onclick="setLang('en')">ENG</a>
  </div>
</header>
 
<!-- ══════════════════════════════════════
     SCREEN APP
══════════════════════════════════════ -->
<main>
  <div class="calculator-grid">
 
    <!-- ФОРМА -->
    <div class="card form-card">
      <div class="form-group">
        <label data-i18n="obj_desc">Описание объекта</label>
        <input type="text" id="objDesc">
      </div>
      <div class="form-group">
        <label data-i18n="obj_price">Стоимость объекта</label>
        <input type="text" id="price" oninput="formatInput(this)" placeholder="0">
      </div>
      <div class="form-group">
        <label data-i18n="advance_pct">Аванс (%)</label>
        <div class="input-wrap">
          <input type="number" id="advPct" min="1" max="99" step="1" placeholder="30">
          <span class="input-suffix">%</span>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="term_months">Срок (мес.)</label>
        <input type="number" id="term" min="1" max="120" step="1" placeholder="24">
      </div>
      <button class="btn btn-primary" onclick="calculate()" data-i18n="calc_btn">Рассчитать</button>
      <button class="btn btn-secondary" style="margin-top:10px" onclick="enterClientMode()" data-i18n="client_btn">Режим для клиента</button>
    </div>
 
    <!-- РЕЗУЛЬТАТЫ -->
    <div id="resultsPanel">
 
      <!-- Шапка в режиме для клиента -->
      <div class="client-summary-header">
        <div class="logo-icon" style="width:42px;height:42px;font-size:21px">Э</div>
        <!-- Или логотип картинкой: -->
        <!-- <img class="logo-img" src="./assets/logo.png" alt="Эсхата Leasing" style="height:42px"> -->
        <div>
          <div class="print-title">Эсхата Leasing</div>
          <div class="print-subtitle" id="screenSubtitle">График лизинговых платежей</div>
        </div>
      </div>
 
      <!-- Карточки результатов -->
      <div id="resultCards">
        <div class="empty-results card">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="18" rx="3"/><path d="M7 8h10M7 12h6M7 16h4"/>
          </svg>
          <p data-i18n="empty_hint">Введите параметры и нажмите «Рассчитать»</p>
        </div>
      </div>
 
      <!-- График платежей (экран) -->
      <div id="scheduleSection" class="schedule-section" style="display:none">
        <div class="section-title" data-i18n="schedule_title">График платежей</div>
        <div class="card" style="padding:0;overflow:hidden">
          <table id="screenTable">
            <thead>
              <tr>
                <th>№</th>
                <th id="th-total">Сумма платежа</th>
                <th id="th-balance">Остаток долга</th>
              </tr>
            </thead>
            <tbody id="schedBody"></tbody>
            <tfoot id="schedFoot"></tfoot>
          </table>
        </div>
      </div>
 
      <!-- Кнопки действий -->
      <div class="action-btns" id="actionBtns">
        <button class="btn-print" onclick="doPrint()" data-i18n="print_btn">🖨 Распечатать</button>
        <button class="btn-exit" onclick="exitClientMode()" data-i18n="exit_client">← Назад</button>
      </div>
 
    </div>
  </div>
</main>
 
<!-- ══════════════════════════════════════
     ПЕЧАТНЫЙ ДОКУМЕНТ (скрыт на экране)
══════════════════════════════════════ -->
<div id="printDoc">
 
  <!-- Логотип в печати -->
  <table class="pd-logo-box" cellpadding="0" cellspacing="0">
    <tr>
      <td class="pd-logo-inner">
        <!--
          ЛОГОТИП В ПЕЧАТИ:
          Вариант А (текущий): SVG-круг с буквой
          Вариант Б: картинка — замените SVG на:
          <img src="./assets/logo.png" style="height:36pt;width:auto;" alt="">
        -->
        <svg width="42" height="42" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
          <circle cx="21" cy="21" r="21" fill="#1a4fa0"/>
          <text x="21" y="28" text-anchor="middle" fill="white" font-size="20"
                font-family="Arial" font-weight="bold">Э</text>
        </svg>
      </td>
      <td class="pd-logo-inner2">
        <div class="pd-logo-name">Eskhata <em>Leasing</em></div>
      </td>
    </tr>
  </table>
 
  <!-- Стоимость + общая стоимость договора -->
  <table class="pd-top" id="pdTop"></table>
 
  <!-- Условия лизинга -->
  <table class="pd-cond" id="pdCond"></table>
 
  <!-- Общая сумма при подписании -->
  <table class="pd-sign" id="pdSign"></table>
 
  <!-- Долг -->
  <table class="pd-debt" id="pdDebt"></table>
 
  <!-- График платежей -->
  <div class="pd-sched-wrap">
    <div class="pd-sched-hd">График платежей</div>
    <table class="pd-sched" id="pdSched">
      <thead>
        <tr>
          <th>Месяц</th>
          <th>оплаты</th>
          <th>уплате</th>
        </tr>
      </thead>
      <tbody id="pdSchedBody"></tbody>
    </table>
  </div>
 
</div>
 
<script>

let currentLang='ru';
function t(k){return LANGS[currentLang][k]||k}
 
function setLang(lang){
  currentLang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.getAttribute('data-i18n')));
  document.querySelectorAll('.lang-switcher a').forEach(a=>
    a.classList.toggle('active',a.textContent===lang.toUpperCase()||(lang==='en'&&a.textContent==='ENG')));
  const thMap={['th-total']:'th_total',['th-balance']:'th_balance'};
  Object.entries(thMap).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=t(key)});
  if(lastResult)renderResults(lastResult);
}
 
/* ══════════════════════════════════
   Форматирование чисел
══════════════════════════════════ */
function formatInput(el){
  const r=el.value.replace(/[^\d]/g,'');
  el.value=r?Number(r).toLocaleString('ru-RU'):'';
}
function parseVal(s){
  if(!s)return 0;
  return parseFloat(String(s).replace(/[^\d.]/g,''))||0;
}
function fmt(n,dec=2){
  if(n===null||n===undefined)return'—';
  return Number(n.toFixed(dec)).toLocaleString('ru-RU',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtPct(n){
  return(n*100).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+'%';
}
 
/* ══════════════════════════════════
   Математика
══════════════════════════════════ */
const TARGET_IRR=0.30, IRR_STEP=0.0001, DISC_STEP=0.0005, DISC_MAX=0.50;
const REG_FEE=1000000; // регистрационный сбор — только внутренний расчёт, клиенту не показывается
 
function ceilTo(v,s){return Math.ceil((v+s-1e-7)/s)*s}
 
function calcNominalIRR(cfs){
  let lo=-0.9999,hi=100,npvLo=0,npvHi=0;
  for(let i=0;i<cfs.length;i++){
    npvLo+=cfs[i]/Math.pow(1+lo,i);
    npvHi+=cfs[i]/Math.pow(1+hi,i);
  }
  if(npvLo*npvHi>0)return -999;
  let mid=0;
  for(let it=0;it<300;it++){
    mid=(lo+hi)/2;
    let npv=0;
    for(let i=0;i<cfs.length;i++)npv+=cfs[i]/Math.pow(1+mid,i);
    if(Math.abs(npv)<0.01)break;
    if(npv>0)lo=mid;else hi=mid;
  }
  return mid*12;
}
 
function buildCFs(price,advance,debt,term,disc){
  const da=price*disc,vat=da*12/112;
  const cf0=advance-(price-da+vat+REG_FEE);
  const mp=debt/term;
  const cfs=[cf0];
  for(let i=1;i<=term;i++)cfs.push(mp);
  return cfs;
}
 
/*
  ══════════════════════════════════════════════════════════
  ТАБЛИЦА ФИКСИРОВАННЫХ ДИСКОНТОВ
  Формат: { term: <срок мес.>, adv: <аванс 0..1>, disc: <дисконт 0..1> }
  Пример: срок 24 мес, аванс 50% → дисконт 14,25%
  Добавляйте новые строки по мере необходимости.
  ══════════════════════════════════════════════════════════
*/
const FIXED_DISCOUNTS=[
  {term:24, adv:0.50, disc:0.1425},
  // {term:12, adv:0.30, disc:0.XXXX},
  // {term:36, adv:0.70, disc:0.XXXX},
];
 
function findDiscount(price,advance,debt,term,advPct){
  for(const r of FIXED_DISCOUNTS)
    if(r.term===term&&Math.abs(advPct-r.adv)<0.0001)return r.disc;
  let d=DISC_STEP;
  while(d<=DISC_MAX){
    const irr=calcNominalIRR(buildCFs(price,advance,debt,term,d));
    if(irr>0&&ceilTo(irr,IRR_STEP)>=TARGET_IRR)return ceilTo(d,0.0001);
    d=Math.round((d+DISC_STEP)*1e6)/1e6;
  }
  return -1;
}
 
function buildSchedule(debt,term,discAmt){
  // Маржа распределяется пропорционально остатку долга (убывающая база)
  const totalMargin=discAmt*100/112;
  const principalPerMonth=debt/term;
  const sumBal=term*debt-principalPerMonth*(term*(term-1)/2);
  const monthlyRate=sumBal>0?totalMargin/sumBal:0;
  const rows=[];
  let bal=debt,totP=0,totM=0,totT=0;
  for(let j=1;j<=term;j++){
    const principal=(j===term)?bal:principalPerMonth;
    const margin=(j===term)?(totalMargin-totM):bal*monthlyRate;
    const total=principal+margin;
    const newBal=(j===term)?0:bal-principal;
    totP+=principal;totM+=margin;totT+=total;
    rows.push({num:j,total,principal,margin,balance:newBal<0.01?0:newBal});
    bal=newBal<0.01?0:newBal;
  }
  rows._totals={principal:totP,margin:totM,total:totT};
  return rows;
}
 
/* ══════════════════════════════════
   Состояние и расчёт
══════════════════════════════════ */
let lastResult=null;
 
function calculate(){
  const price=parseVal(document.getElementById('price').value);
  const advPct=parseVal(document.getElementById('advPct').value)/100;
  const term=parseInt(document.getElementById('term').value)||0;
  const desc=document.getElementById('objDesc').value.trim();
 
  if(price<=0){alert('Введите стоимость объекта');return}
  if(advPct<=0||advPct>=1){alert('Введите корректный аванс (1–99%)');return}
  if(term<=0){alert('Введите срок');return}
 
  const advance=price*advPct,debt=price-advance;
  const foundDisc=findDiscount(price,advance,debt,term,advPct);
  if(foundDisc<0){alert('Не удалось найти дисконт. Проверьте входные данные.');return}
 
  const discAmt=price*foundDisc;
  const vatOnDisc=discAmt*12/112;
  const monthPay=debt/term;
  const totalPay=advance+monthPay*term; // клиенту — без регистрационного сбора
  const overpay=totalPay-price;
  const schedule=buildSchedule(debt,term,discAmt);
 
  lastResult={desc,price,advance,advPct,debt,term,foundDisc,discAmt,vatOnDisc,monthPay,totalPay,overpay,schedule};
  renderResults(lastResult);
}
 
/* ══════════════════════════════════
   Отрисовка экрана
══════════════════════════════════ */
function renderResults(r){
  const mdInput=document.getElementById('maxDiscInput');
  const mdPct=mdInput?parseVal(mdInput.value)/100:0;
  const mdVal=mdInput?mdInput.value:'';
  let clientFeePct=0,clientFeeAmt=0;
  if(mdPct>0&&mdPct<r.foundDisc){
    clientFeePct=r.foundDisc-mdPct;
    clientFeeAmt=r.price*clientFeePct;
  }
 
  document.getElementById('resultCards').innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="results-grid">
        ${r.desc?`<div class="result-cell full highlight">
          <div class="cell-label">${t('lbl_desc')}</div>
          <div class="cell-value" style="font-size:15px">${r.desc}</div>
        </div>`:''}
        <div class="result-cell">
          <div class="cell-label">${t('lbl_debt')}</div>
          <div class="cell-value">${fmt(r.debt)}</div>
        </div>
        <div class="result-cell">
          <div class="cell-label">${t('lbl_advance')}</div>
          <div class="cell-value">${fmt(r.advance)}</div>
          <div class="cell-sub">${(r.advPct*100).toFixed(0)}%</div>
        </div>
        <div class="result-cell full">
          <div class="cell-label">${t('lbl_total')}</div>
          <div class="cell-value">${fmt(r.totalPay)}</div>
        </div>
        <div class="internal-row">
          <div>
            <div class="cell-label">${t('lbl_discount')}</div>
            <div class="cell-value">${fmtPct(r.foundDisc)}</div>
            <div class="cell-sub" style="color:#92400e">${fmt(r.discAmt)}</div>
          </div>
          <span class="internal-badge">${t('internal_label')}</span>
        </div>
        <div class="max-disc-row">
          <div class="cell-label">${t('lbl_max_disc')}</div>
          <div class="max-disc-input-row">
            <div class="input-wrap" style="width:130px">
              <input type="number" id="maxDiscInput" min="0" max="100" step="0.01"
                placeholder="${t('placeholder_max_disc')}"
                oninput="renderResults(lastResult)"
                value="${mdVal}">
              <span class="input-suffix">%</span>
            </div>
            <span class="max-disc-amt">${mdPct>0?fmt(r.price*mdPct):''}</span>
          </div>
        </div>
        ${clientFeePct>0?`
        <div class="client-fee-row">
          <div>
            <div class="cell-label">${t('lbl_client_fee')}</div>
            <div class="cell-value">${fmtPct(clientFeePct)}</div>
            <div class="cell-sub" style="color:#7c3aed">${fmt(clientFeeAmt)}</div>
          </div>
        </div>`:''}
      </div>
    </div>`;
 
  // Таблица на экране
  const tbody=document.getElementById('schedBody');
  tbody.innerHTML='';
  r.schedule.forEach(row=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${row.num}</td><td>${fmt(row.principal)}</td><td>${fmt(row.balance)}</td>`;
    tbody.appendChild(tr);
  });
  const tot=r.schedule._totals;
  document.getElementById('schedFoot').innerHTML=
    `<tr><td><b>Итого</b></td><td>${fmt(tot.principal)}</td><td>—</td></tr>`;
 
  document.getElementById('scheduleSection').style.display='block';
  document.getElementById('actionBtns').classList.add('visible');
  document.getElementById('screenSubtitle').textContent=
    t('print_subtitle')+(r.desc?` — ${r.desc}`:'');
}
 
/* ══════════════════════════════════
   Построение печатного документа
══════════════════════════════════ */
function buildPrintDoc(r,clientFeePct,clientFeeAmt){
  const INSURANCE_PCT=0.0016;
  const insuranceAmt=r.price*INSURANCE_PCT;
  const commissionPct=clientFeePct>0?clientFeePct:0;
  const commissionAmt=clientFeePct>0?clientFeeAmt:0;
  const signingTotal=r.advance+(commissionAmt||0)+insuranceAmt;
  const contractTotal=signingTotal+r.monthPay*r.term;
 
  // Стоимость объекта + общая стоимость договора
  document.getElementById('pdTop').innerHTML=`
    <tr><td class="pt-lbl">Стоимость объекта</td><td class="pt-val">${fmt(r.price,2)}</td></tr>
    <tr><td class="pt-lbl">Общая стоимость договора</td><td class="pt-val">${fmt(contractTotal,2)}</td></tr>`;
 
  // Условия лизинга
  document.getElementById('pdCond').innerHTML=`
    <tr class="pd-cond-head"><td colspan="3">Условия лизинга</td></tr>
    <tr><td class="pc-lbl">Тип графика платежей</td><td class="pc-mid"></td><td class="pc-val">Рассрочка</td></tr>
    <tr class="pc-alt"><td class="pc-lbl">Срок</td><td class="pc-mid">Мес.</td><td class="pc-val">${r.term}</td></tr>
    <tr><td class="pc-lbl">Авансовый платёж</td><td class="pc-mid">${(r.advPct*100).toFixed(0)}%</td><td class="pc-val">${fmt(r.advance,2)}</td></tr>
    <tr class="pc-alt"><td class="pc-lbl">Комиссия за оформление</td><td class="pc-mid">${commissionPct>0?fmtPct(commissionPct):'0,00%'}</td><td class="pc-val">${commissionAmt>0?fmt(commissionAmt,2):'-'}</td></tr>
    <tr><td class="pc-lbl">Страхование на весь срок</td><td class="pc-mid">0,16%</td><td class="pc-val">${fmt(insuranceAmt,2)}</td></tr>`;
 
  // Общая сумма при подписании
  document.getElementById('pdSign').innerHTML=`
    <tr><td class="ps-lbl">Общая сумма к оплате при подписании:</td><td class="ps-val">${fmt(signingTotal,2)}</td></tr>`;
 
  // Долг
  document.getElementById('pdDebt').innerHTML=`
    <tr><td class="pdl">Долг</td><td class="pdv">${fmt(r.debt,2)}</td></tr>`;
 
  // График платежей
  const pdBody=document.getElementById('pdSchedBody');
  let rows=`<tr class="sched-sub">
    <td></td>
    <td>${fmt(r.debt,2)}</td>
    <td>${fmt(r.debt,2)}</td>
  </tr>`;
  rows+=r.schedule.map(row=>`
    <tr>
      <td>${row.num}</td>
      <td>${fmt(row.principal,0)}</td>
      <td>${fmt(row.balance,0)}</td>
    </tr>`).join('');
  pdBody.innerHTML=rows;
}
 
/* ══════════════════════════════════
   Режим для клиента и печать
══════════════════════════════════ */
function enterClientMode(){
  if(!lastResult){alert('Сначала нажмите «Рассчитать»');return}
  document.body.classList.add('client-mode');
}
function exitClientMode(){
  document.body.classList.remove('client-mode');
}
 
function doPrint(){
  if(!lastResult)return;
  const mdInput=document.getElementById('maxDiscInput');
  const mdPct=mdInput?parseVal(mdInput.value)/100:0;
  let clientFeePct=0,clientFeeAmt=0;
  if(mdPct>0&&mdPct<lastResult.foundDisc){
    clientFeePct=lastResult.foundDisc-mdPct;
    clientFeeAmt=lastResult.price*clientFeePct;
  }
  buildPrintDoc(lastResult,clientFeePct,clientFeeAmt);
  setTimeout(()=>window.print(),100);
}
